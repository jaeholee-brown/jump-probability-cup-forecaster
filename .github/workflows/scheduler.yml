name: Probability Cup Scheduler

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scheduler command: refresh, due, or loop"
        required: false
        default: "due"
  schedule:
    # Poll for newly posted games every 6 hours.
    - cron: "17 */6 * * *"
    # Watchdog due-checker. GitHub cron delivery is best-effort, so any
    # received tick runs an internal loop and can restart the self-dispatch loop.
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: probability-cup-forecaster
  cancel-in-progress: false

jobs:
  scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      actions: write
      contents: read
    env:
      SPORTSPREDICT_API_KEY: ${{ secrets.SPORTSPREDICT_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MAX_TOKENS: "16000"
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      EVENT_ID: ${{ vars.EVENT_ID }}
      SUBMIT: "true"
      FORECAST_MODEL: gpt-5
      RESEARCH_MODEL: gpt-5.4-mini
      GROK_RESEARCH_MODEL: grok-4.20-multi-agent-0309
      GROK_RESEARCH_PASSES: overview,base_rates,late_news,market_micro,lineup_roles,volatile_market_anchors
      GROK_RESEARCH_REASONING_EFFORT: medium
      USE_GROK_EVIDENCE_QA: "true"
      GROK_EVIDENCE_QA_MODEL: grok-4.20-multi-agent-0309
      GROK_EVIDENCE_QA_REASONING_EFFORT: low
      GROK_NEWS_MODEL: grok-4.20-multi-agent-0309
      GROK_NEWS_REASONING_EFFORT: low
      GROK_FORECAST_MODELS: grok-4.3,grok-4.20-0309-reasoning
      CLAUDE_FORECAST_MODELS: claude-opus-4-8,claude-opus-4-6
      USE_OPENAI_FORECAST: "true"
      USE_GROK_RESEARCH: "true"
      USE_GROK_FORECAST: "true"
      USE_CLAUDE_FORECAST: "true"
      OPENAI_FORECAST_VARIANTS: base_rate_frequency
      GROK_FORECAST_VARIANTS: base_rate_frequency
      CLAUDE_FORECAST_VARIANTS: base_rate_frequency
      OPENAI_FORECAST_WEIGHT: "1.0"
      GROK_FORECAST_WEIGHT: "0.5"
      CLAUDE_FORECAST_WEIGHT: "0.75"
      FORECAST_MODEL_WEIGHTS: gpt-5=0.35,grok-4.3=0.2,grok-4.20-0309-reasoning=0.15,claude-opus-4-8=1.2,claude-opus-4-6=1.1
      APPLY_CALIBRATION_WEIGHTS: "true"
      CALIBRATION_LEARNING_RATE: "1.8"
      CALIBRATION_PRIOR_COUNT: "20"
      USE_GROK_NEWS_MONITOR: "true"
      NEWS_MONITOR_MAX_HOURS_TO_CLOSE: "168"
      NEWS_MONITOR_MATERIALITY_THRESHOLD_POINTS: "2"
      STALE_REFORECAST_WITHOUT_NEWS: "true"
      SCHEDULER_FORECAST_OFFSET_MINUTES: "1440"
      SCHEDULER_NEWS_OFFSET_MINUTES: "40"
      USE_FIRECRAWL_RETRIEVAL: "true"
      FIRECRAWL_MODE: targeted
      FIRECRAWL_SEARCH_LIMIT: "5"
      FIRECRAWL_SEARCH_QUERIES: "2"
      FIRECRAWL_FORCE_WITHIN_HOURS: "2"
      FIRECRAWL_VOLATILE_WITHIN_HOURS: "24"
      FIRECRAWL_DISAGREEMENT_THRESHOLD_POINTS: "20"
      REASONING_EFFORT: medium
      ENABLE_COHERENCE_ADJUSTMENTS: "true"
      COHERENCE_MIN_ADJUSTMENT_POINTS: "2"
      PENALTY_TAKER_SOT_FLOOR_FRACTION: "0.45"
      PENALTY_TAKER_GOAL_FLOOR_FRACTION: "0.32"
      MAX_HOURS_TO_CLOSE: "168"
      ENABLE_UPDATE_GATE: "true"
      MAX_PREDICTION_AGE_HOURS: "24"
      FORCE_REFORECAST_WITHIN_HOURS: "1.5"
      FINAL_REFORECAST_MIN_INTERVAL_MINUTES: "30"
      UPDATE_THRESHOLD_POINTS: "2"
      SPORTSPREDICT_RETRY_ATTEMPTS: "6"
      SPORTSPREDICT_RETRY_INITIAL_SECONDS: "2"
      SPORTSPREDICT_RETRY_MAX_SECONDS: "60"
      SPORTSPREDICT_UPDATE_INTERVAL_SECONDS: "1.1"
      CONCURRENCY: "10"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore forecast state
        uses: actions/cache/restore@v4
        with:
          path: state/
          key: forecast-state-${{ github.run_id }}
          restore-keys: |
            forecast-state-

      - name: Run scheduler
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -z "$SPORTSPREDICT_API_KEY" ]; then
            echo "SPORTSPREDICT_API_KEY is required for scheduler."
            exit 1
          fi
          if [ "$INPUT_MODE" = "loop" ] || [ "$EVENT_SCHEDULE" = "7,22,37,52 * * * *" ]; then
            echo "Scheduler mode=loop schedule='${EVENT_SCHEDULE}'"
            for iteration in 1 2 3 4 5; do
              echo "::group::Due check iteration ${iteration}"
              probability-cup-bot schedule --run-due
              echo "::endgroup::"
              if [ "$iteration" = "5" ]; then
                break
              fi
              SLEEP_SECONDS=600
              echo "Sleeping ${SLEEP_SECONDS}s before next due-check iteration"
              sleep "$SLEEP_SECONDS"
            done
          elif [ "$EVENT_SCHEDULE" = "17 */6 * * *" ] || [ "$INPUT_MODE" = "refresh" ]; then
            echo "Scheduler mode=refresh schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot schedule --refresh-only
          else
            echo "Scheduler mode=due schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot schedule --run-due
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-logs
          path: |
            logs/
            state/
          if-no-files-found: ignore

      - name: Save forecast state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: forecast-state-${{ github.run_id }}

      - name: Dispatch next scheduler loop
        if: ${{ always() && ((github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'loop') || (github.event_name == 'schedule' && github.event.schedule == '7,22,37,52 * * * *')) }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          current_run_id = int(os.environ["GITHUB_RUN_ID"])
          active = []
          for status in ("queued", "in_progress"):
              raw = subprocess.check_output(
                  [
                      "gh",
                      "api",
                      f"repos/{repo}/actions/workflows/scheduler.yml/runs?status={status}&per_page=30",
                  ],
                  text=True,
              )
              for run in json.loads(raw).get("workflow_runs", []):
                  if int(run["id"]) != current_run_id:
                      active.append(
                          f"{run['id']} {run['status']} {run['event']} {run['html_url']}"
                      )

          Path("/tmp/active_scheduler_runs").write_text("\n".join(active))
          Path("/tmp/should_dispatch_loop").write_text("0" if active else "1")
          PY
          if [ "$(cat /tmp/should_dispatch_loop)" != "1" ]; then
            echo "Another scheduler run is already active or queued; not dispatching a duplicate loop."
            cat /tmp/active_scheduler_runs
            exit 0
          fi
          gh workflow run scheduler.yml --ref main -f mode=loop
