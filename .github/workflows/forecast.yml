name: Forecast Probability Cup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without submitting predictions"
        required: false
        default: "false"
  schedule:
    - cron: "7 * * * *"

concurrency:
  group: probability-cup-forecaster
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: read
    env:
      SPORTSPREDICT_API_KEY: ${{ secrets.SPORTSPREDICT_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      SUBMIT: "true"
      FORECAST_MODEL: gpt-5.5
      RESEARCH_MODEL: gpt-5.4-mini
      GROK_RESEARCH_MODEL: grok-4.20-multi-agent-0309
      GROK_FORECAST_MODEL: grok-4.20-multi-agent-0309
      USE_GROK_RESEARCH: "true"
      USE_GROK_FORECAST: "true"
      REASONING_EFFORT: medium
      MAX_HOURS_TO_CLOSE: "168"
      UPDATE_THRESHOLD_POINTS: "2"
      CONCURRENCY: "4"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Forecast
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            probability-cup-bot run --dry-run
          else
            probability-cup-bot run
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs
          path: |
            logs/
            state/
          if-no-files-found: ignore
