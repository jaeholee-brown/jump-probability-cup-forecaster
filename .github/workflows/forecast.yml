name: Forecast Probability Cup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without submitting predictions"
        required: false
        default: "false"
      inspect_docket:
        description: "List current matches/questions only; no LLM calls or submissions"
        required: false
        default: "false"
      repair_boundary_forecasts:
        description: "Repair saved Grok boundary probabilities from state/latest-run.json and submit updates; no LLM calls"
        required: false
        default: "false"
      schedule_mode:
        description: "Optional scheduler command: refresh or due"
        required: false
        default: ""
      dashboard_snapshot:
        description: "Fetch platform predictions and upload a dashboard artifact"
        required: false
        default: "false"
      inspect_max_questions:
        description: "Maximum questions to print when inspect_docket is true"
        required: false
        default: "2000"
concurrency:
  group: probability-cup-forecaster
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: read
    env:
      SPORTSPREDICT_API_KEY: ${{ secrets.SPORTSPREDICT_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MAX_TOKENS: "16000"
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      EVENT_ID: ${{ vars.EVENT_ID }}
      SUBMIT: "true"
      FORECAST_MODEL: gpt-5
      RESEARCH_MODEL: gpt-5.4-mini
      GROK_RESEARCH_MODEL: grok-4.20-multi-agent-0309
      GROK_RESEARCH_PASSES: overview,base_rates,late_news,market_micro,lineup_roles,volatile_market_anchors
      GROK_RESEARCH_REASONING_EFFORT: medium
      USE_GROK_EVIDENCE_QA: "true"
      GROK_EVIDENCE_QA_MODEL: grok-4.20-multi-agent-0309
      GROK_EVIDENCE_QA_REASONING_EFFORT: low
      GROK_NEWS_MODEL: grok-4.20-multi-agent-0309
      GROK_NEWS_REASONING_EFFORT: low
      GROK_FORECAST_MODELS: grok-4.3,grok-4.20-0309-reasoning
      CLAUDE_FORECAST_MODELS: claude-opus-4-8,claude-opus-4-6
      USE_OPENAI_FORECAST: "true"
      USE_GROK_RESEARCH: "true"
      USE_GROK_FORECAST: "true"
      USE_CLAUDE_FORECAST: "true"
      OPENAI_FORECAST_VARIANTS: base_rate_frequency
      GROK_FORECAST_VARIANTS: base_rate_frequency
      CLAUDE_FORECAST_VARIANTS: base_rate_frequency
      OPENAI_FORECAST_WEIGHT: "1.0"
      GROK_FORECAST_WEIGHT: "0.5"
      CLAUDE_FORECAST_WEIGHT: "0.75"
      FORECAST_MODEL_WEIGHTS: gpt-5=0.35,grok-4.3=0.2,grok-4.20-0309-reasoning=0.15,claude-opus-4-8=1.2,claude-opus-4-6=1.1
      APPLY_CALIBRATION_WEIGHTS: "true"
      CALIBRATION_LEARNING_RATE: "1.8"
      CALIBRATION_PRIOR_COUNT: "20"
      USE_GROK_NEWS_MONITOR: "true"
      NEWS_MONITOR_MAX_HOURS_TO_CLOSE: "168"
      NEWS_MONITOR_MATERIALITY_THRESHOLD_POINTS: "2"
      STALE_REFORECAST_WITHOUT_NEWS: "true"
      SCHEDULER_FORECAST_OFFSET_MINUTES: "1440"
      SCHEDULER_NEWS_OFFSET_MINUTES: "40"
      USE_FIRECRAWL_RETRIEVAL: "true"
      FIRECRAWL_MODE: targeted
      FIRECRAWL_SEARCH_LIMIT: "5"
      FIRECRAWL_SEARCH_QUERIES: "2"
      FIRECRAWL_FORCE_WITHIN_HOURS: "2"
      FIRECRAWL_VOLATILE_WITHIN_HOURS: "24"
      FIRECRAWL_DISAGREEMENT_THRESHOLD_POINTS: "20"
      REASONING_EFFORT: medium
      ENABLE_COHERENCE_ADJUSTMENTS: "true"
      COHERENCE_MIN_ADJUSTMENT_POINTS: "2"
      PENALTY_TAKER_SOT_FLOOR_FRACTION: "0.45"
      PENALTY_TAKER_GOAL_FLOOR_FRACTION: "0.32"
      MAX_HOURS_TO_CLOSE: "168"
      ENABLE_UPDATE_GATE: "true"
      MAX_PREDICTION_AGE_HOURS: "24"
      FORCE_REFORECAST_WITHIN_HOURS: "1.5"
      FINAL_REFORECAST_MIN_INTERVAL_MINUTES: "30"
      UPDATE_THRESHOLD_POINTS: "2"
      SPORTSPREDICT_RETRY_ATTEMPTS: "6"
      SPORTSPREDICT_RETRY_INITIAL_SECONDS: "2"
      SPORTSPREDICT_RETRY_MAX_SECONDS: "60"
      SPORTSPREDICT_UPDATE_INTERVAL_SECONDS: "1.1"
      CONCURRENCY: "10"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Restore forecast state
        uses: actions/cache/restore@v4
        with:
          path: state/
          key: forecast-state-${{ github.run_id }}
          restore-keys: |
            forecast-state-

      - name: Check forecast secrets
        id: forecast_secrets
        env:
          INPUT_INSPECT_DOCKET: ${{ github.event.inputs.inspect_docket }}
          INPUT_REPAIR_BOUNDARY_FORECASTS: ${{ github.event.inputs.repair_boundary_forecasts }}
          INPUT_SCHEDULE_MODE: ${{ github.event.inputs.schedule_mode }}
          INPUT_DASHBOARD_SNAPSHOT: ${{ github.event.inputs.dashboard_snapshot }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if { [ "$INPUT_INSPECT_DOCKET" = "true" ] || [ "$INPUT_REPAIR_BOUNDARY_FORECASTS" = "true" ] || [ "$INPUT_SCHEDULE_MODE" = "refresh" ] || [ "$INPUT_SCHEDULE_MODE" = "due" ] || [ "$INPUT_DASHBOARD_SNAPSHOT" = "true" ] || [ "$EVENT_SCHEDULE" = "17 */6 * * *" ]; } && [ -n "$SPORTSPREDICT_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_SCHEDULE" = "2-59/5 * * * *" ] && [ -n "$SPORTSPREDICT_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$SPORTSPREDICT_API_KEY" ] && { [ -n "$OPENAI_API_KEY" ] || [ -n "$XAI_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ]; }; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping forecast: set SPORTSPREDICT_API_KEY plus at least one model API key, or use inspect/repair mode with SPORTSPREDICT_API_KEY."
          fi

      - name: Forecast
        if: steps.forecast_secrets.outputs.available == 'true'
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_INSPECT_DOCKET: ${{ github.event.inputs.inspect_docket }}
          INPUT_REPAIR_BOUNDARY_FORECASTS: ${{ github.event.inputs.repair_boundary_forecasts }}
          INPUT_SCHEDULE_MODE: ${{ github.event.inputs.schedule_mode }}
          INPUT_DASHBOARD_SNAPSHOT: ${{ github.event.inputs.dashboard_snapshot }}
          INPUT_INSPECT_MAX_QUESTIONS: ${{ github.event.inputs.inspect_max_questions }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "$INPUT_INSPECT_DOCKET" = "true" ]; then
            echo "Forecast workflow mode=inspect_docket schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot inspect-docket --max-questions "${INPUT_INSPECT_MAX_QUESTIONS:-2000}"
          elif [ "$INPUT_REPAIR_BOUNDARY_FORECASTS" = "true" ]; then
            echo "Forecast workflow mode=repair_boundary_forecasts schedule='${EVENT_SCHEDULE}'"
            python scripts/repair_boundary_forecasts.py \
              --artifact state/latest-run.json \
              --submit \
              --output "logs/repair-boundary-$(date -u +%Y%m%dT%H%M%SZ).json" \
              --corrected-run-output state/latest-run-repaired.json
          elif [ "$INPUT_SCHEDULE_MODE" = "refresh" ]; then
            echo "Forecast workflow mode=schedule_refresh_manual schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot schedule --refresh-only
          elif [ "$INPUT_SCHEDULE_MODE" = "due" ]; then
            echo "Forecast workflow mode=schedule_due_manual schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot schedule --run-due
          elif [ "$INPUT_DASHBOARD_SNAPSHOT" = "true" ]; then
            echo "Forecast workflow mode=dashboard_snapshot schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot dashboard --output dashboard
          elif [ "$EVENT_SCHEDULE" = "17 */6 * * *" ]; then
            echo "Forecast workflow mode=schedule_refresh schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot schedule --refresh-only
          elif [ "$EVENT_SCHEDULE" = "2-59/5 * * * *" ]; then
            echo "Forecast workflow mode=schedule_due_check schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot schedule --run-due
          elif [ "$INPUT_DRY_RUN" = "true" ]; then
            echo "Forecast workflow mode=dry_run schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot run --dry-run
          else
            echo "Forecast workflow mode=full_run schedule='${EVENT_SCHEDULE}'"
            probability-cup-bot run
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs
          path: |
            logs/
            state/
            dashboard/
          if-no-files-found: ignore

      - name: Save forecast state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/
          key: forecast-state-${{ github.run_id }}
